name: ZF-HALO CI

on:
  push:
    branches: [main, qa]
  pull_request:
    branches: [main, qa]

jobs:
  test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: zf-halo-core

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user_zf
          POSTGRES_PASSWORD: password_zf
          POSTGRES_DB: zf_halo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Run linter
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test

      - name: Sync Database Schema
        env:
          DATABASE_URL: "postgresql://user_zf:password_zf@localhost:5432/zf_halo_test?schema=public"
        run: npx prisma db push --force-reset

      - name: Run E2E tests
        env:
          DATABASE_URL: "postgresql://user_zf:password_zf@localhost:5432/zf_halo_test?schema=public"
          JWT_SECRET: "ci-test-jwt-secret-for-github-actions-32-chars-long"
          JWT_EXPIRES_IN: "1h"
          NODE_ENV: "test"
        run: pnpm test:e2e


  build:
    runs-on: ubuntu-latest
    needs: test
    
    defaults:
      run:
        working-directory: zf-halo-core

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Build
        run: pnpm build
