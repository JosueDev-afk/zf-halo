services:
  postgres:
    image: postgres:15-alpine
    container_name: zf-db
    environment:
      POSTGRES_USER: user_zf
      POSTGRES_PASSWORD: password_zf
      POSTGRES_DB: zf_halo
    ports: ["5432:5432"]

  redis:
    image: redis:7-alpine
    container_name: zf-redis
    ports: ["6379:6379"]

  zf-halo-core:
    build: ./zf-halo-core
    ports: ["3000:3000"]
    environment:
      DATABASE_URL: "postgresql://user_zf:password_zf@postgres:5432/zf_halo?schema=public"
      TELEGRAM_TOKEN: "TU_BOT_TOKEN"
    depends_on:
      - postgres
      - redis

  prometheus:
    image: prom/prometheus
    volumes: ["./prometheus.yml:/etc/prometheus/prometheus.yml"]
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana
    ports: ["3001:3000"]
    depends_on: ["prometheus"]