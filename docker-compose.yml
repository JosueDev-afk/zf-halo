volumes:
  postgres_data:

services:
  postgres:
    image: postgres:15-alpine
    container_name: zf-db
    environment:
      POSTGRES_USER: user_zf
      POSTGRES_PASSWORD: password_zf
      POSTGRES_DB: zf_halo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_zf -d zf_halo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zf-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zf-halo-core:
    build: ./zf-halo-core
    container_name: zf-core
    ports:
      - "3005:3000"
    environment:
      DATABASE_URL: "postgresql://user_zf:password_zf@postgres:5432/zf_halo?schema=public"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: "dev-secret-change-in-production-32chars"
      JWT_EXPIRES_IN: "7d"
      NODE_ENV: development
      CORS_ORIGIN: "http://localhost:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000/metrics"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus
    container_name: zf-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: zf-grafana
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  zf-halo-client:
    build: ./zf-halo-client
    container_name: zf-client
    expose:
      - "80"
    depends_on:
      zf-halo-core:
        condition: service_healthy
